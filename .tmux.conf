# ==========================================
# FULL TMUX CONFIGURATION
# ==========================================

# 1. Change prefix from Ctrl+b to Ctrl+a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# 2. Easy-to-remember split pane commands
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# 3. Enable mouse support (clicking, resizing, scrolling)
set -g mouse on

# 4. Fix colors for Alacritty and other terminals
set -g default-terminal "screen-256color"
set -as terminal-features ",xterm-256color:RGB"

# 5. COPY ALL LINES IN ONE ACTION (Shortcut: Ctrl+a then d)
# This enters copy mode, selects everything, copies it, exits, 
# and then displays a message at the bottom so you know it worked.
bind-key d copy-mode \; \
         send-keys -X select-all \; \
         send-keys -X copy-selection-and-cancel \; \
         display-message "All lines copied to tmux buffer!"

# 6. Optional: Use Vi-style keys for manual navigation
setw -g mode-keys vi
