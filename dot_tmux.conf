# Set prefix to Ctrl+a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Start window numbering at 1 (not 0)
set -g base-index 1
setw -g pane-base-index 1

# Enable mouse support
set -g mouse on

# Increase history limit
set -g history-limit 10000

# 256 color support
set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ',xterm-256color:RGB'

# Use Vi-style keys for manual navigation
setw -g mode-keys vi

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Continuum settings
set -g @continuum-restore 'on'
set -g @continuum-save-interval '60'

# Shortcut: Ctrl+a then f (Copy everything)
bind-key f copy-mode \; \
    send-keys -X select-all \; \
    send-keys -X copy-selection-and-cancel \; \
    display-message "All lines copied to tmux buffer!"

# Initialize TPM (MUST be at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
